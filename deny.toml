# cargo-deny 0.19.x configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Ignore list — add RUSTSEC-XXXX-XXXX entries here if a dep has a known
# advisory that cannot be bumped yet (always document the reason).
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    # webpki-roots (Mozilla TLS root certs) — permissive data license
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[licenses.private]
# Workspace crates have publish = false; ignore their license field.
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Path dependencies (intra-workspace) have no version number by design;
# allow them to avoid false-positive wildcard errors.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
